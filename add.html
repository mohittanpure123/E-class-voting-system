<!DOCTYPE html>
<html>
<head>
    <title>Manage Voter List</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="header">
    <h2>Manage Voter List (Teacher / Admin)</h2>
</div>

<div class="vote-box">
    <h3>Add Voter</h3>

    <input type="text" id="voterId" placeholder="Student ID">
    <input type="text" id="voterName" placeholder="Student Name">
    <button onclick="addVoter()">Add Voter</button>

    <hr>

    <h3>Voter List</h3>

     <table border="1" width="100%" id="voterTable"> 
        <tr>
            <th>Student ID</th>
            <th>Name</th>
            <th>Action</th>
        </tr>
    </table>
</div>
